# ════════════════════════════════════════════════════════════════
# Server A (Gateway) — VBS Service
# 3-Server Pipeline: Phase 6.5
# ════════════════════════════════════════════════════════════════
# Host: Linux 1 CPU / 2GB — Cloudflare Tunnel + VBS
# Usage:
#   cd deploy && docker compose -f docker-compose.server-a.yml up -d
# ════════════════════════════════════════════════════════════════

version: "3.8"

services:
  vbs:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: tradingbot-vbs
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - VBS_MODE=true
      - HOST=0.0.0.0
      - PORT=5000
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - VPS_BUFFER_SECRET=${VPS_BUFFER_SECRET}
    volumes:
      - vbs_data:/app/data
    networks:
      - tailscale
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  vbs_data:

networks:
  tailscale:
    external: true
