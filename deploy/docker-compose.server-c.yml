# ════════════════════════════════════════════════════════════════
# Server C (AI Core) — ChromaDB + Analyzer Worker
# 3-Server Pipeline: Phase 6.5
# ════════════════════════════════════════════════════════════════
# Host: Linux 8 CPU / 16GB — ChromaDB Server + Analyzer Worker
# Usage:
#   cd deploy && docker compose -f docker-compose.server-c.yml up -d
# ════════════════════════════════════════════════════════════════

version: "3.8"

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: tradingbot-chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - analyzer
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3

  analyzer:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: tradingbot-analyzer
    command: ["python", "workers/vps_analyzer.py"]
    restart: unless-stopped
    depends_on:
      chromadb:
        condition: service_healthy
    environment:
      - ANALYZER_MODE=true
      - VPS_BUFFER_URL=http://${SERVER_A_IP}:5000
      - VPS_BUFFER_SECRET=${VPS_BUFFER_SECRET}
      - VPS_CONSUMER_ID=server-c-analyzer
      - CHROMA_REMOTE=true
      - CHROMA_SERVER_HOST=chromadb
      - CHROMA_SERVER_PORT=8000
      - LOCAL_EXECUTE_URL=${LOCAL_EXECUTE_URL}
      - LOCAL_EXECUTE_SECRET=${LOCAL_EXECUTE_SECRET}
      - SERVER_B_EXECUTE_URL=http://${SERVER_B_IP}:5002
      - SERVER_B_SECRET=${SERVER_B_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - AI_PROVIDER=${AI_PROVIDER:-anthropic}
      - RISK_PER_TRADE=${RISK_PER_TRADE:-0.02}
      - STOP_LOSS_PCT=${STOP_LOSS_PCT:-0.08}
    networks:
      - analyzer
      - tailscale
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3

volumes:
  chroma_data:

networks:
  analyzer:
  tailscale:
    external: true
